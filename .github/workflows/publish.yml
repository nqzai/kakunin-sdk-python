name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'   # e.g. v0.2.0

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Type-check
        run: mypy kakunin/

      - name: Test
        run: pytest tests/ -v

  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: pip install build hatchling

      - name: Build
        run: python -m build

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        # OIDC trusted publishing — configure nqzai/kakunin-sdk-python as a
        # trusted publisher for the "kakunin" project on PyPI (no token needed).
